<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>松鼠AI · 管理后台</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f0f2f5;color:#1a1d28;margin:0;padding:16px;max-width:680px;margin:0 auto}
  h1{font-size:18px;margin:6px 0 16px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:14px}
  input,select{padding:10px 12px;border:1px solid #d1d5db;border-radius:9px;font-size:14px;width:100%;outline:none}
  input:focus,select:focus{border-color:#6366f1}
  button{padding:10px 15px;border:none;border-radius:9px;background:#6366f1;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap}
  button:hover{background:#4f51d6}
  button:disabled{opacity:.5;cursor:default}
  button.ghost{background:#eef0f4;color:#333}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .order{border:1px solid #eee;border-radius:11px;padding:11px 13px;margin-bottom:9px}
  .badge{font-size:12px;padding:3px 9px;border-radius:99px;font-weight:600}
  .b-wait{background:#fef3c7;color:#92400e}.b-done{background:#dcfce7;color:#166534}
  .muted{color:#6b7280;font-size:12px;line-height:1.6}
  #login,#panel{display:none}
  .ok{color:#16a34a;font-size:13px}.err{color:#dc2626;font-size:13px}
  b.big{font-size:15px}
</style></head><body>
<h1>🐿️ 松鼠AI · 管理后台</h1>

<div id="login" class="card" style="display:block">
  <div class="muted" style="margin-bottom:10px">请输入管理员密码进入</div>
  <div class="row"><input id="pw" type="password" placeholder="管理员密码" style="flex:1" onkeydown="if(event.key==='Enter')login()"><button onclick="login()">进入</button></div>
  <div id="login-msg" class="err" style="margin-top:8px"></div>
</div>

<div id="panel">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <b class="big">📋 待处理 / 全部订单</b>
      <button class="ghost" onclick="loadOrders()">🔄 刷新</button>
    </div>
    <div class="muted" style="margin:8px 0 12px">客户点「我已付款」后会出现在这里。<b>收到款后</b>点对应订单的「确认开通」即可。</div>
    <div id="orders"></div>
  </div>

  <div class="card">
    <b class="big">✍️ 手动开通（直接按账号）</b>
    <div class="muted" style="margin:8px 0 12px">客户没点"我已付款"、或你想直接开：填他的<b>登录账号</b>，选套餐，点开通。</div>
    <div class="row" style="margin-bottom:9px">
      <input id="m-acc" placeholder="客户登录账号" style="flex:2;min-width:140px">
      <select id="m-tier" style="flex:1;min-width:90px"><option value="standard">标准版 ¥239</option><option value="basic">体验版 ¥79</option><option value="pro">专业版 ¥649</option></select>
      <button onclick="manualActivate()">开通</button>
    </div>
    <div class="row"><button class="ghost" onclick="lookup()">🔍 查这个账号现状</button></div>
    <div id="m-msg" style="margin-top:10px"></div>
  </div>
  <div class="muted" style="text-align:center">提示：开通后让客户<b>刷新页面或重新登录</b>即可看到会员生效。</div>
</div>

<script>
const A=location.origin;
let PW='';
const TIER={basic:'体验版',standard:'标准版',pro:'专业版',test:'测试'};
async function post(p,b){
  const r=await fetch(A+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...b,admin_pass:PW})});
  return r.json();
}
function enter(orders){document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';render(orders)}
async function login(){
  PW=document.getElementById('pw').value.trim();
  const r=await post('/api/admin/orders',{});
  if(r.error){document.getElementById('login-msg').textContent=r.error;PW='';return}
  sessionStorage.setItem('ss_pw',PW);enter(r.orders);
}
async function loadOrders(){const r=await post('/api/admin/orders',{});if(r.error)return alert(r.error);render(r.orders)}
function render(orders){
  const el=document.getElementById('orders');
  if(!orders||!orders.length){el.innerHTML='<div class="muted">暂无订单</div>';return}
  el.innerHTML=orders.map(o=>{
    const done=(o.status==='已开通'||o.status==='paid');
    const acc=(o.account||'').replace(/'/g,'');
    return `<div class="order"><div class="row" style="justify-content:space-between">
      <div><b>${o.account||'(未知账号)'}</b> · ${o.tier_name||TIER[o.tier]||o.tier||''} · ¥${o.amount||''}</div>
      <span class="badge ${done?'b-done':'b-wait'}">${o.status||''}</span></div>
      <div class="muted">${(o.created_at||'').replace('T',' ').slice(0,16)} · 单号 ${o.id}</div>
      ${done?'':`<div style="margin-top:9px"><button onclick="activate('${acc}','${o.tier}','${o.id}',this)">✅ 确认收款，开通</button></div>`}
    </div>`;
  }).join('');
}
async function activate(acc,tier,oid,btn){
  if(!acc)return alert('该订单没有账号，请用下方"手动开通"');
  if(btn)btn.disabled=true;
  const r=await post('/api/admin/activate',{account:acc,tier:tier,order_id:oid});
  if(r.error){alert(r.error);if(btn)btn.disabled=false;return}
  loadOrders();
}
async function manualActivate(){
  const acc=document.getElementById('m-acc').value.trim();
  const tier=document.getElementById('m-tier').value;
  const m=document.getElementById('m-msg');
  if(!acc){m.className='err';m.textContent='请输入客户登录账号';return}
  const r=await post('/api/admin/activate',{account:acc,tier});
  if(r.error){m.className='err';m.textContent=r.error;return}
  m.className='ok';m.textContent=`✅ 已为 ${r.account} 开通${TIER[tier]}，到期 ${new Date(r.member_until).toLocaleDateString()}`;
  loadOrders();
}
async function lookup(){
  const acc=document.getElementById('m-acc').value.trim();
  const m=document.getElementById('m-msg');
  if(!acc){m.className='err';m.textContent='请输入账号';return}
  const r=await post('/api/admin/lookup',{account:acc});
  if(r.error){m.className='err';m.textContent=r.error;return}
  if(!r.found){m.className='err';m.textContent='查无此账号（注意大小写、确认对方注册过）';return}
  m.className='';m.style.color='#333';m.style.fontSize='13px';
  m.textContent=r.member?`✅ 会员，到期 ${new Date(r.member_until).toLocaleDateString()}`:'⚪️ 当前是免费用户';
}
(function(){const s=sessionStorage.getItem('ss_pw');if(s){PW=s;post('/api/admin/orders',{}).then(r=>{if(!r.error)enter(r.orders);else PW=''})}})();
</script>
</body></html>
