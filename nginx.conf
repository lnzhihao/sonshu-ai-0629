# ═══════════════════════════════════════════════════════
# 新媒体工具 — Nginx 反向代理配置
# 
# 部署后三步启用:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/xinmeiti
#   2. sudo ln -sf /etc/nginx/sites-available/xinmeiti /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════

# 如果只需要 HTTP (无域名), 使用这个配置
server {
    listen 80;
    # ⚠️ 替换为你的域名或服务器IP
    server_name _;

    # 上传文件大小限制 (视频可能很大)
    client_max_body_size 500M;

    # ═══════════════════════════════════════════
    # 前端静态页面
    # ═══════════════════════════════════════════
    location / {
        root /opt/xinmeiti-app/src/renderer;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 禁用 HTML 缓存, 确保用户拿到最新版本
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # 静态资源缓存 30 天
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══════════════════════════════════════════
    # API 反向代理 → Node.js (端口 8787)
    # ═══════════════════════════════════════════
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        # SSE (Server-Sent Events) 支持
        # AI 生成流水线使用 SSE 推送进度
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # 超时设置: AI 生成可能需要几分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 传递真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ═══════════════════════════════════════════
    # 成品库视频直出
    # ═══════════════════════════════════════════
    location /output-video/ {
        alias /home/你的用户名/xinmeiti-output/;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";

        # 支持视频断点续传 (Range)
        add_header Accept-Ranges bytes;

        types {
            video/mp4 mp4;
            video/mov mov;
        }
    }

    # ═══════════════════════════════════════════
    # 本地素材文件 (可选)
    # ═══════════════════════════════════════════
    location /local-media/ {
        alias /home/你的用户名/;
        add_header Access-Control-Allow-Origin "*";
    }

    # ═══════════════════════════════════════════
    # 健康检查
    # ═══════════════════════════════════════════
    location /health {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }

    # ═══════════════════════════════════════════
    # Gzip 压缩
    # ═══════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               image/svg+xml;
}

# ═══════════════════════════════════════════════════════
# HTTPS 配置 (有域名后启用)
# 使用 certbot 自动配置:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d 你的域名
# ═══════════════════════════════════════════════════════
